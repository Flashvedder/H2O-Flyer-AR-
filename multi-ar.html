<!doctype html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
        <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-detector.js"></script>
        <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-handler.js"></script>
    </head>

    <body style="margin: 0; overflow: hidden;">
        <a-scene
            vr-mode-ui="enabled: false;"
            loading-screen="enabled: false;"
            renderer="logarithmicDepthBuffer: true;"
            arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
            id="scene"
            embedded
            gesture-detector
        >
            <a-assets>
                <a-asset-item
                    id="turtle-asset"
                    src="assets/turtle/asset.glb"
                ></a-asset-item>
                <a-asset-item
                    id="lobster-asset"
                    src="assets/lobster/asset.glb"
                ></a-asset-item>
                <a-asset-item
                    id="shipwreck-asset"
                    src="assets/shipwreck/asset.glb"
                ></a-asset-item>
            </a-assets>

            <!-- TURTLE MARKER -->
            <a-marker
                id="turtle-marker"
                type="pattern"
                preset="custom"
                url="assets/turtle/marker.patt"
                raycaster="objects: .clickable"
                emitevents="true"
                cursor="fuse: false; rayOrigin: mouse;"
            >
                <a-entity
                    id="turtle-model"
                    scale="0.6739551698601495 0.6739551698601495 0.6739551698601495"
                    animation-mixer="loop: repeat"
                    gltf-model="#turtle-asset"
                    class="clickable"
                    gesture-handler
                ></a-entity>
            </a-marker>

            <!-- LOBSTER MARKER -->
            <a-marker
                id="lobster-marker"
                type="pattern"
                preset="custom"
                url="assets/lobster/marker.patt"
                raycaster="objects: .clickable"
                emitevents="true"
                cursor="fuse: false; rayOrigin: mouse;"
            >
                <a-entity
                    id="lobster-model"
                    scale="0.023486824566427908 0.023486824566427908 0.023486824566427908"
                    animation-mixer="loop: repeat"
                    gltf-model="#lobster-asset"
                    class="clickable"
                    gesture-handler
                ></a-entity>
            </a-marker>

            <!-- SHIPWRECK MARKER -->
            <a-marker
                id="shipwreck-marker"
                type="pattern"
                preset="custom"
                url="assets/shipwreck/marker.patt"
                raycaster="objects: .clickable"
                emitevents="true"
                cursor="fuse: false; rayOrigin: mouse;"
            >
                <a-entity
                    id="shipwreck-model"
                    scale="0.023486824566427908 0.023486824566427908 0.023486824566427908"
                    animation-mixer="loop: repeat"
                    gltf-model="#shipwreck-asset"
                    class="clickable"
                    gesture-handler
                ></a-entity>
            </a-marker>

            <a-entity camera></a-entity>
        </a-scene>
    </body>
</html>
